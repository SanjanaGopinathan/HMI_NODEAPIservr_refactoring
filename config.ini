# MCP Server + Orchestrator Configuration

[mcp_server]
api_base_url = http://127.0.0.1:8015
hmi_mapper_url = http://127.0.0.1:8015
host = 0.0.0.0
port = 8001
timeout = 30
max_retries = 3

[orchestrator]
mcp_server_url = http://127.0.0.1:8001/mcp-server/mcp
host = 0.0.0.0
port = 8020

# Default tenant/site/gateway IDs (used when not explicitly provided in API requests)
default_tenant_id = TENANT_01
default_site_id = SITE_01
